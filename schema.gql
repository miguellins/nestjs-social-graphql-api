# Defines the sape of your data and what operations are allowed
# The contract between the client and the server
# what exists and how it can be queried or changed

## USER
## Object type
type User {
  id: ID!
  name: String!
  email: String!
  username: String!
  # Password only in CreateUserInput
}

## Read operation
type Query {
  users: [User!]!
}

## Input type
input CreateUserInput {
  name: String!
  email: String!
  username: String!
  password: String!
}

## Mutation
type Mutation {
  createUser(input: CreateUserInput!): User!
}

## POST
## Object type
type Post {
  id: ID!
  title: String!
  content: String!
  createdAt: DateTime!
  authorId: Int!
  author: User!
}

## Read operation
type Query {
  posts: [Post!]!
  post(id: Int!): Post
  postsByUser(userId: Int!): [Post!]!
}

## Input type
input CreatePostInput {
  title: String!
  content: String!
  authorId: Int!
}

input UpdatePostInput {
  title: String
  content: String
}

## Mutation
type Mutation {
  createPost(input: CreatePostInput!): Post!
  updatePost(id: Int!, input: UpdatePostInput!): Post!
  deletePost(id: Int!): Boolean!
}