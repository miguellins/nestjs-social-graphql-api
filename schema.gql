type User {
  id: ID!
  name: String!
  email: String!
  username: String!
  # Password only in CreateUserInput
}

type Query {
  users: [User!]!
}

input CreateUserInput {
  name: String!
  email: String!
  username: String!
  password: String!
}

type Mutation {
  createUser(input: CreateUserInput!): User!
}

type Post {
  id: ID!
  title: String!
  content: String!
  createdAt: DateTime!
  authorId: Int!
  author: User!
}

type Query {
  posts: [Post!]!
  post(id: Int!): Post
  postsByUser(userId: Int!): [Post!]!
}

input CreatePostInput {
  title: String!
  content: String!
  authorId: Int!
}

input UpdatePostInput {
  title: String
  content: String
}

type Mutation {
  createPost(input: CreatePostInput!): Post!
  updatePost(id: Int!, input: UpdatePostInput!): Post!
  deletePost(id: Int!): Boolean!
}