groups:
  - name: application-observability
    rules:
      - alert: GraphQLHighP95Latency
        expr: |
          histogram_quantile(
            0.95,
            sum by (le, operation_type) (rate(graphql_operation_duration_seconds_bucket{process="api"}[10m]))
          ) > 1.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: GraphQL p95 latency is above the v1 placeholder threshold.
          description: GraphQL {{ $labels.operation_type }} p95 latency has exceeded 1.5s for 10 minutes. Tune this threshold after the first baseline week.

      - alert: GraphQLSustainedOperationErrors
        expr: |
          sum by (operation_name, error_code) (rate(graphql_operation_errors_total{process="api"}[10m])) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: GraphQL operation errors are sustained above the v1 placeholder threshold.
          description: GraphQL {{ $labels.operation_name }} is returning {{ $labels.error_code }} errors above 0.2/sec for 10 minutes. Tune this threshold after the first baseline week.

      - alert: GraphQLInternalErrorRate
        expr: |
          sum(rate(graphql_operations_total{process="api",outcome="internal_error"}[10m])) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: GraphQL internal errors are sustained.
          description: Internal GraphQL errors have stayed above 0.05/sec for 10 minutes.

      - alert: CacheGetOrSetHighMissRatio
        expr: |
          (
            sum(rate(cache_operations_total{operation="get_or_set",result="miss"}[10m]))
            /
            clamp_min(sum(rate(cache_operations_total{operation="get_or_set",result=~"hit|miss"}[10m])), 0.001)
          ) > 0.8
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Cache get_or_set miss ratio is high.
          description: Global get_or_set miss ratio has exceeded 80% for 10 minutes.

      - alert: PrismaQueryErrors
        expr: |
          sum by (model, action, outcome) (rate(prisma_queries_total{outcome!="success"}[10m])) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Prisma query errors are sustained.
          description: Prisma {{ $labels.model }}.{{ $labels.action }} is producing {{ $labels.outcome }} outcomes above 0.1/sec for 10 minutes.

      - alert: AuthFailureSpike
        expr: |
          sum by (reason) (rate(auth_failures_total{process="api"}[10m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Auth failures are elevated.
          description: Auth failures for {{ $labels.reason }} have exceeded 1/sec for 10 minutes.

      - alert: ThrottleRejectionSpike
        expr: |
          sum(rate(throttle_rejections_total{process="api"}[10m])) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: Throttle rejections are elevated.
          description: Throttle rejections have exceeded 0.5/sec for 10 minutes.
